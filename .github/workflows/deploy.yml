# GitHub Actions Workflow: Auto deploy Hexo blog to GitHub Pages
#
# Usage:
#   1. Push your blog source code to the 'main' branch of your repo
#   2. Go to repo Settings -> Pages -> Source -> select "gh-pages" branch
#   3. Every time you push to 'main', this workflow will automatically build & deploy
#
# If you are deploying to <username>.github.io, make sure the repo name matches.

name: Deploy Hexo Blog

on:
    push:
        branches:
            - main
    workflow_dispatch: # Allow manual trigger from GitHub Actions tab
    repository_dispatch:
        types:
            - deploy

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: "pages"
    cancel-in-progress: true

defaults:
    run:
        working-directory: .

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  submodules: recursive

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"

            - name: Install dependencies
              run: npm ci

            - name: Create theme config with secrets
              run: |
                  cat > _config.typography.yml << EOF
                  gitalk:
                      enable: true
                      clientID: "${{ secrets.GITALK_CLIENT_ID }}"
                      clientSecret: "${{ secrets.GITALK_CLIENT_SECRET }}"
                      repo: "Allengl.github.io"
                      owner: "Allengl"
                      admin: ["Allengl"]
                      language: "zh-CN"
                      labels: ["Gitalk"]
                      perPage: 10
                      pagerDirection: "last"
                      distractionFreeMode: false
                      createIssueManually: false
                  EOF

            - name: Clean
              run: npx hexo clean

            - name: Generate
              run: npx hexo generate

            - name: Upload artifact
              uses: actions/upload-pages-artifact@v3
              with:
                  path: ./public

    deploy:
        needs: build
        runs-on: ubuntu-latest
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
